<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeBuilder Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1 class="logo">ResumeBuilder Pro</h1>
            <div class="nav-links">
                <button class="btn-nav" onclick="showSection('home')">Home</button>
                <button class="btn-nav" onclick="showSection('editor')">Create Resume</button>
                <button class="btn-nav" onclick="showSection('pricing')">Pricing</button>
                <button id="authBtn" class="btn-auth" onclick="toggleLoginModal()">Login</button>
            </div>
        </div>
    </nav>

    <section id="home" class="section active">
        <div class="hero">
            <h2>Create Your Professional Resume in Minutes</h2>
            <button class="btn-primary btn-lg" onclick="showSection('editor')">Start Creating</button>
        </div>
    </section>

    <section id="editor" class="section">
        <h2>Resume Editor</h2>
        <div class="editor-container">
            <div class="editor-sidebar">
                <input type="text" placeholder="Full Name" id="fullName" onchange="updateResume()">
                <input type="email" placeholder="Email" id="email" onchange="updateResume()">
            </div>
            <div class="resume-preview">
                <h2 id="previewName">Your Name</h2>
            </div>
        </div>
    </section>

    <section id="pricing" class="section">
        <h2>Pricing</h2>
        <div id="paypal-button-container-premium"></div>
        <div id="paypal-button-container-lifetime"></div>
    </section>

    <div id="loginModal" class="modal" style="display:none;">
        <input type="email" placeholder="Email" id="loginEmail">
        <button onclick="handleLogin()">Login</button>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/paypal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
