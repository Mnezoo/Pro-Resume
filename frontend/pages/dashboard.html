<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Resume Creator</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .resumes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .resume-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .resume-card:hover {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-5px);
        }

        .resume-card h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .resume-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .resume-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-edit {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-delete {
            background-color: #f44336;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
        }

        .empty-state img {
            max-width: 200px;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>Resume Creator</h1>
            </div>
            <ul class="nav-links">
                <li><span id="userEmail"></span></li>
                <li><a href="editor.html" class="btn-primary">New Resume</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h2>My Resumes</h2>
            </div>

            <div id="resumesContainer" class="resumes-grid">
                <div class="empty-state">
                    <h3>No resumes yet</h3>
                    <p>Create your first resume to get started</p>
                    <button class="btn-primary" onclick="window.location.href='editor.html'">Create Resume</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        function initDashboard() {
            if (!isAuthenticated()) {
                window.location.href = '../index.html';
                return;
            }

            const user = getCurrentUser();
            document.getElementById('userEmail').textContent = user?.email || 'User';
            loadResumes();
        }

        async function loadResumes() {
            try {
                const response = await fetchWithToken(`${API_URL}/resumes`);
                const resumes = await response.json();

                const container = document.getElementById('resumesContainer');

                if (resumes.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>No resumes yet</h3>
                            <p>Create your first resume to get started</p>
                            <button class="btn-primary" onclick="window.location.href='editor.html'">Create Resume</button>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = resumes.map(resume => `
                    <div class="resume-card">
                        <h3>${resume.title}</h3>
                        <p>Created: ${formatDate(resume.createdAt)}</p>
                        <div class="resume-actions">
                            <button class="btn-edit" onclick="editResume('${resume._id}')">Edit</button>
                            <button class="btn-delete" onclick="deleteResume('${resume._id}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading resumes:', error);
                showNotification('Failed to load resumes', 'error');
            }
        }

        function editResume(id) {
            window.location.href = `editor.html?id=${id}`;
        }

        async function deleteResume(id) {
            if (!confirm('Are you sure you want to delete this resume?')) return;

            try {
                const response = await fetchWithToken(`${API_URL}/resumes/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showNotification('Resume deleted successfully', 'success');
                    loadResumes();
                } else {
                    showNotification('Failed to delete resume', 'error');
                }
            } catch (error) {
                console.error('Error deleting resume:', error);
                showNotification('An error occurred', 'error');
            }
        }

        initDashboard();
    </script>
</body>
</html>
